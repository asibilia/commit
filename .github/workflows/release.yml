# Changesets-driven release + publish pipeline.
#
# Flow:
#   1. PR with .changeset/*.md merges to main
#   2. This workflow opens (or updates) a "chore(release): version package"
#      PR that bumps package.json and updates CHANGELOG.md
#   3. When that PR merges to main, this workflow runs again — but with no
#      pending changesets, so it executes the `publish` command instead,
#      which creates a GitHub Release tagged v<version>
#   4. Immediately after the release is created, the publish job in this
#      same workflow publishes @alecsibilia/commit to npm.
#
# Note: We publish inline rather than listening for `release: published`
# because releases created by GITHUB_TOKEN do not trigger downstream
# workflows (GitHub's recursion-prevention behavior).
#
# Requirements:
#   - npm Trusted Publisher configured on npmjs.com for
#     @alecsibilia/commit, pointing at this repository and the
#     `Release` workflow. No NPM_TOKEN secret is used — the publish job
#     authenticates via OIDC, which also produces signed provenance
#     attestations on each release.

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'asibilia'
    permissions:
      contents: write
      pull-requests: write
      # issues: write is needed for `gh label create` (POST /repos/{owner}/{repo}/labels).
      # `pull-requests: write` alone is enough to add a label to a PR, but not to
      # create the label in the first place on a fresh repo.
      issues: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure "automated" label exists
        run: |
          gh label create automated \
            --color cccccc \
            --description "Auto-generated by GitHub Actions" \
            2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Version PR title
        id: pr_title
        run: |
          TITLE=$(bun .github/scripts/compute-release-title.ts)
          echo "value=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Open Version PR or create Release
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun .github/scripts/create-release.ts
          title: ${{ steps.pr_title.outputs.value }}
          commit: ${{ steps.pr_title.outputs.value }}
          # Our create-release.ts handles GitHub Release creation with a
          # custom tag format (vX.Y.Z) and changelog extraction. Disable
          # the action's built-in release creation to avoid duplicates.
          createGithubReleases: false
          # Author the Version PR's commits via the GitHub Contents API
          # instead of `git commit` from the runner. API-authored commits
          # are signed by GitHub's web-flow key, which satisfies the
          # `required_signatures` ruleset on `main`. Without this, the
          # Version PR's commits are unsigned and the merge is blocked.
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply "automated" label to Version PR
        if: steps.changesets.outputs.pullRequestNumber != ''
        run: gh pr edit ${{ steps.changesets.outputs.pullRequestNumber }} --add-label automated
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    # The npm Trusted Publisher for @alecsibilia/commit is configured
    # with `Environment name: npm-publish`. That makes npm require the
    # incoming OIDC token to carry an `environment` claim matching that
    # value. Declaring `environment: npm-publish` here is what gets that
    # claim onto the token GitHub mints for this job. Without it the npm
    # token-exchange call fails silently and the npm CLI surfaces the
    # failure as `ENEEDAUTH` (npm/cli#9088).
    environment: npm-publish
    # id-token: write is required for npm trusted publishing (OIDC).
    # No NPM_TOKEN is used — npm exchanges this OIDC token for a
    # short-lived publish credential via the trusted publisher
    # configured on npmjs.com.
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node 24 is the active LTS and bundles npm >= 11.12, which clears
      # the 11.5.1 floor required for npm trusted publishing. Node 22
      # LTS peaked at npm 10.9.7, so we can't use it without a manual
      # upgrade.
      #
      # NOTE: do NOT pass `registry-url` here. setup-node responds by
      # writing `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`
      # into an .npmrc, and npm uses any configured `_authToken` in
      # preference to OIDC trusted publishing. Without a real NPM_TOKEN
      # that resolves to setup-node's literal placeholder string and
      # the registry returns 404. Leaving registry-url unset means
      # setup-node writes no .npmrc. The default registry is npmjs.org
      # anyway.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Determine npm dist-tag
        id: dist_tag
        run: |
          VERSION=$(jq -r .version package.json)
          if [[ "$VERSION" == *-alpha.* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *-beta.* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "Publishing $VERSION with dist-tag: $(grep tag= "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: Publish to npm via OIDC trusted publishing
        run: npm publish --access public --provenance --tag ${{ steps.dist_tag.outputs.tag }}
